name: REX CI

on:
  push:
    branches: [main, master, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, master]

jobs:
  # ── Fast unit tests — always runs, < 30s ───────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run unit tests
        run: pnpm test

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/cli/coverage/
          retention-days: 7

  # ── Build check — ensure TypeScript compiles ───────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter rex-claude build

      - name: Check dist output
        run: test -f packages/cli/dist/index.js && echo "✓ dist/index.js exists"

  # ── Security audit ─────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true

      - name: Check for secrets in diff
        run: |
          # Simple grep for common secret patterns in changed files
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs grep -l 'sk-[a-zA-Z0-9]\{48\}\|ghp_[a-zA-Z0-9]\{36\}\|AKIA[0-9A-Z]\{16\}' 2>/dev/null; then
            echo "⚠️  Possible secrets detected in diff — review before merging"
            exit 1
          fi
          echo "✓ No secrets detected"
