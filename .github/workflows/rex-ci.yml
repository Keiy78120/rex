name: REX CI

on:
  workflow_dispatch: # manual only — auto CI disabled

jobs:
  # ── Type check — zero TS errors ────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm --filter rex-claude exec tsc --noEmit

  # ── Unit + integration tests — always runs, < 30s ──────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm --filter rex-claude test:coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/cli/coverage/
          retention-days: 7

  # ── Build check — ensure tsup compiles ─────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter rex-claude build

      - name: Verify dist output
        run: test -f packages/cli/dist/index.js && echo "✓ dist/index.js exists"

  # ── Security audit ─────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true

      - name: Check for secrets in diff
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null \
            | xargs grep -l 'sk-[a-zA-Z0-9]\{48\}\|ghp_[a-zA-Z0-9]\{36\}\|AKIA[0-9A-Z]\{16\}' 2>/dev/null; then
            echo "⚠️  Possible secrets detected — review before merging"
            exit 1
          fi
          echo "✓ No secrets detected"
