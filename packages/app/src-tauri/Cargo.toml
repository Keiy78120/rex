[package]
name = "rex-app"
version = "0.1.0"
description = "REX — Claude Code productivity centralizer"
authors = ["D-Studio"]
edition = "2021"

[lib]
name = "rex_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
whisper-rs = "0.14"
cpal = "0.15"
hound = "3.5"
tauri-plugin-global-shortcut = "2"
dirs = "6"
